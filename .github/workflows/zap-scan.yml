name: OWASP ZAP Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  issues: write
  pull-requests: write

jobs:
  zap-scan:
    runs-on: ubuntu-latest
    name: ZAP Security Scan

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask

      - name: Start target app
        run: |
          nohup python target_app.py > app.log 2>&1 &
          sleep 10

      - name: Verify target app
        run: |
          curl http://127.0.0.1:5001 || true

      - name: ZAP Baseline Scan
        uses: zaproxy/action-baseline@v0.12.0
        with:
          target: 'http://127.0.0.1:5001'
          fail_action: false
          allow_issue_writing: false
          artifact_name: 'zap-scan-report'

      - name: List generated files
        if: always()
        run: |
          echo "Current Directory:"
          pwd
          echo "All Files:"
          find . -type f

      - name: Upload HTML Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-html-report
          path: |
            *.html
            **/*.html
          if-no-files-found: warn

      - name: Upload JSON Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-json-report
          path: |
            *.json
            **/*.json
          if-no-files-found: warn

      - name: Upload XML Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: zap-xml-report
          path: |
            *.xml
            **/*.xml
          if-no-files-found: warn